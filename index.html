<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Joyería</title>
    <!-- Fuente Google -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap">
    <!-- Iconos Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Enlace a CSS externo -->
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <!-- Botón flotante WhatsApp -->
    <a href="https://api.whatsapp.com/send?phone=+573006009881&text=Hola! Quiero consultar sobre los productos de Viva Team Shop" class="btn-wsp" target="_blank">
        <i class="fa fa-whatsapp"></i>
    </a>

    <!-- Encabezado -->
    <header>
        <h1>Viva Team Shop</h1>
    </header>

    <!-- Contenido principal -->
    <section class="contenedor">
        <!-- Productos -->
        <div class="contenedor-items">
            <div class="item" data-id="1" data-nombre="Pulso Oro 18k Lm" data-precio="130000">
                <span class="titulo-item">Pulso Oro 18k Lm</span>
                <img src="img/pulso2.jpg" alt="Pulso Oro 18k Lm" class="img-item">
                <span class="precio-item">$130.000</span>
                <button class="boton-item" onclick="agregarAlCarrito(1, 'Pulso Oro 18k Lm', 130000, 'img/pulso2.jpg')">Agregar al Carrito</button>
            </div>
            <div class="item" data-id="2" data-nombre="Oso Ingles 18K Lm" data-precio="210000">
                <span class="titulo-item">Oso Ingles 18K Lm</span>
                <img src="img/oso1.jpg" alt="Oso Ingles 18K Lm" class="img-item">
                <span class="precio-item">$210.000</span>
                <button class="boton-item" onclick="agregarAlCarrito(2, 'Oso Ingles 18K Lm', 210000, 'img/oso1.jpg')">Agregar al Carrito</button>
            </div>
            <div class="item" data-id="3" data-nombre="Cadena Digen 18K Lm" data-precio="180000">
                <span class="titulo-item">Cadena Digen 18K Lm</span>
                <img src="img/cadena4.jpg" alt="Cadena Digen 18K Lm" class="img-item">
                <span class="precio-item">$180.000</span>
                <button class="boton-item" onclick="agregarAlCarrito(3, 'Cadena Digen 18K Lm', 180000, 'img/cadena4.jpg')">Agregar al Carrito</button>
            </div>
            <div class="item" data-id="4" data-nombre="Cadena DigeXr 18K Lm" data-precio="160000">
                <span class="titulo-item">Cadena DigeXr 18K Lm</span>
                <img src="img/cadena6.jpg" alt="Cadena DigeXr 18K Lm" class="img-item">
                <span class="precio-item">$160.000</span>
                <button class="boton-item" onclick="agregarAlCarrito(4, 'Cadena DigeXr 18K Lm', 160000, 'img/cadena6.jpg')">Agregar al Carrito</button>
            </div>
            <div class="item" data-id="5" data-nombre="Pulsera 18K Lm" data-precio="85000">
                <span class="titulo-item">Pulsera 18K Lm</span>
                <img src="img/pulso8.jpg" alt="Pulsera 18K Lm" class="img-item">
                <span class="precio-item">$85.000</span>
                <button class="boton-item" onclick="agregarAlCarrito(5, 'Pulsera 18K Lm', 85000, 'img/pulso8.jpg')">Agregar al Carrito</button>
            </div>
            <div class="item" data-id="6" data-nombre="Cadena Coz 18K Lm" data-precio="110000">
                <span class="titulo-item">Cadena Coz 18K Lm</span>
                <img src="img/cadena9.jpg" alt="Cadena Coz 18K Lm" class="img-item">
                <span class="precio-item">$110.000</span>
                <button class="boton-item" onclick="agregarAlCarrito(6, 'Cadena Coz 18K Lm', 110000, 'img/cadena9.jpg')">Agregar al Carrito</button>
            </div>
        </div>

        <!-- Carrito de compras -->
        <div class="carrito">
            <div class="header-carrito">
                <h2>Tu Carrito</h2>
            </div>

            <div class="carrito-items" id="carritoItems">
                <!-- Elementos del carrito se cargan aquí -->
                <p style="padding: 20px; text-align: center; color: var(--color-gris-oscuro);">El carrito está vacío</p>
            </div>

            <!-- Formulario de datos -->
            <div class="form-datos">
                <h3>Datos para pedido y factura</h3>
                <input type="text" id="nombreCliente" placeholder="Tu nombre completo *" required>
                <input type="text" id="celularCliente" placeholder="Tu número de celular *" required>
                <input type="text" id="direccionCliente" placeholder="Dirección de entrega *" required>
                <input type="text" id="datosFactura" placeholder="Datos para factura (NIT/CC, razón social) *" required>
                <textarea id="comentariosCliente" placeholder="Comentarios adicionales"></textarea>
            </div>

            <!-- Total y botón único -->
            <div class="carrito-total" id="carritoTotal">
                <div class="fila">
                    <strong>Total a pagar</strong>
                    <span class="carrito-precio-total">$0</span>
                </div>
                <button class="btn-pedido-factura" onclick="enviarPedidoYFactura()">
                    <i class="fa fa-shopping-cart"></i> Enviar Pedido & Generar Factura
                </button>
            </div>
        </div>
    </section>

    <!-- Enlace a JavaScript externo -->
    <script src="script.js"></script>
</body>
</html>
