<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Joyería</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #f5f5f5; }

        /* HEADER */
        header {
            background-color: #D4AF37;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        /* CONTENEDOR DE PRODUCTOS */
        .productos-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* TARJETA DE PRODUCTO */
        .producto-tarjeta {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            padding: 15px;
            text-align: center;
        }

        .producto-titulo {
            font-size: 18px;
            color: #333;
            margin: 10px 0;
        }

        .producto-imagen {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .producto-precio {
            font-size: 17px;
            color: #D4AF37;
            font-weight: bold;
            margin: 10px 0;
        }

        .producto-boton {
            width: 100%;
            background-color: #D4AF37;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        /* CARRITO */
        .carrito-container {
            background-color: white;
            margin: 0 20px 30px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .carrito-titulo {
            color: #D4AF37;
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .carrito-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
        }

        .carrito-vacio {
            text-align: center;
            color: #666;
            padding: 20px;
            font-size: 17px;
        }

        .carrito-total {
            font-size: 20px;
            font-weight: bold;
            color: #D4AF37;
            margin: 20px 0;
            text-align: right;
        }

        /* FORMULARIO */
        .formulario {
            margin: 20px 0;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        /* BOTONES GENERALES */
        .btn-accion {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            color: white;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-whatsapp { background-color: #25d366; }
        .btn-ver-factura { background-color: #D4AF37; }
        .btn-descargar { background-color: #007bff; }

        /* MODAL FACTURA */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-contenido {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
        }

        .factura-titulo {
            color: #D4AF37;
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #D4AF37;
        }

        .factura-linea {
            padding: 8px 0;
            border-bottom: 1px dashed #ddd;
            font-size: 16px;
        }

        .factura-total {
            font-size: 20px;
            font-weight: bold;
            color: #D4AF37;
            text-align: right;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header>VIVA TEAM SHOP - JOYERÍA DE ORO</header>

    <!-- CONTENEDOR DE PRODUCTOS -->
    <div class="productos-container" id="productos-lista">
        <!-- PRODUCTO 1 -->
        <div class="producto-tarjeta">
            <div class="producto-titulo">Pulso Oro 18k</div>
            <img class="producto-imagen" src="https://cdn.pixabay.com/photo/2016/03/31/19/50/jewelry-1295966_1280.jpg" alt="Pulso Oro 18k">
            <div class="producto-precio">$130.000</div>
            <button class="producto-boton" onclick="agregarProducto(1, 'Pulso Oro 18k', 130000)">Agregar al Carrito</button>
        </div>

        <!-- PRODUCTO 2 -->
        <div class="producto-tarjeta">
            <div class="producto-titulo">Oso Inglés 18k</div>
            <img class="producto-imagen" src="https://cdn.pixabay.com/photo/2017/10/25/18/34/gold-2888450_1280.jpg" alt="Oso Inglés 18k">
            <div class="producto-precio">$210.000</div>
            <button class="producto-boton" onclick="agregarProducto(2, 'Oso Inglés 18k', 210000)">Agregar al Carrito</button>
        </div>

        <!-- PRODUCTO 3 -->
        <div class="producto-tarjeta">
            <div class="producto-titulo">Cadena Digen 18k</div>
            <img class="producto-imagen" src="https://cdn.pixabay.com/photo/2018/05/08/08/45/gold-3382509_1280.jpg" alt="Cadena Digen 18k">
            <div class="producto-precio">$180.000</div>
            <button class="producto-boton" onclick="agregarProducto(3, 'Cadena Digen 18k', 180000)">Agregar al Carrito</button>
        </div>

        <!-- PRODUCTO 4 -->
        <div class="producto-tarjeta">
            <div class="producto-titulo">Cadena Figaro 18k</div>
            <img class="producto-imagen" src="https://cdn.pixabay.com/photo/2017/10/25/19/05/chain-2888453_1280.jpg" alt="Cadena Figaro 18k">
            <div class="producto-precio">$220.000</div>
            <button class="producto-boton" onclick="agregarProducto(4, 'Cadena Figaro 18k', 220000)">Agregar al Carrito</button>
        </div>

        <!-- PRODUCTO 5 -->
        <div class="producto-tarjeta">
            <div class="producto-titulo">Cadena Cuban Link 18k</div>
            <img class="producto-imagen" src="https://cdn.pixabay.com/photo/2017/10/25/18/35/gold-2888452_1280.jpg" alt="Cadena Cuban Link 18k">
            <div class="producto-precio">$350.000</div>
            <button class="producto-boton" onclick="agregarProducto(5, 'Cadena Cuban Link 18k', 350000)">Agregar al Carrito</button>
        </div>

        <!-- PRODUCTO 6 -->
        <div class="producto-tarjeta">
            <div class="producto-titulo">Cadena Rolo 18k</div>
            <img class="producto-imagen" src="https://cdn.pixabay.com/photo/2017/10/25/18/36/gold-2888454_1280.jpg" alt="Cadena Rolo 18k">
            <div class="producto-precio">$190.000</div>
            <button class="producto-boton" onclick="agregarProducto(6, 'Cadena Rolo 18k', 190000)">Agregar al Carrito</button>
        </div>
    </div>

    <!-- CARRITO DE COMPRAS -->
    <div class="carrito-container" id="carrito">
        <div class="carrito-titulo">CARRITO DE COMPRAS</div>
        <div id="carrito-items" class="carrito-vacio">Carrito vacío</div>
        <div class="formulario">
            <input type="text" id="nombre" class="form-input" placeholder="Tu nombre *">
            <input type="text" id="nit" class="form-input" placeholder="NIT/CC *">
            <input type="text" id="celular" class="form-input" placeholder="Celular *">
        </div>
        <div id="carrito-total" class="carrito-total">Total: $0</div>
        <button class="btn-accion btn-whatsapp" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
        <button class="btn-accion btn-ver-factura" onclick="mostrarFactura()">Ver Factura</button>
        <button class="btn-accion btn-descargar" onclick="descargarPDF()">Descargar PDF</button>
    </div>

    <!-- MODAL FACTURA -->
    <div class="modal" id="modal-factura">
        <div class="modal-contenido">
            <div class="factura-titulo">FACTURA OFICIAL</div>
            <div id="factura-contenido"></div>
            <button class="btn-accion" style="background-color: red;" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script>
        // VARIABLES GLOBALES
        let carrito = [];

        // FUNCIÓN PARA AGREGAR PRODUCTOS
        function agregarProducto(id, nombre, precio) {
            // BUSCAR SI EL PRODUCTO YA EXISTE
            const existe = carrito.find(item => item.id === id);
            if(existe) {
                existe.cantidad++;
            } else {
                carrito.push({
                    id: id,
                    nombre: nombre,
                    precio: precio,
                    cantidad: 1
                });
            }
            actualizarCarrito();
        }

        // ACTUALIZAR VISTA DEL CARRITO
        function actualizarCarrito() {
            const contenedor = document.getElementById('carrito-items');
            const totalElemento = document.getElementById('carrito-total');
            let html = '';
            let total = 0;

            if(carrito.length === 0) {
                html = '<div class="carrito-vacio">Carrito vacío</div>';
            } else {
                carrito.forEach(item => {
                    const subtotal = item.precio * item.cantidad;
                    total += subtotal;
                    html += `<div class="carrito-item">${item.nombre} - ${item.cantidad}u - $${subtotal.toLocaleString()}</div>`;
                });
            }

            contenedor.innerHTML = html;
            totalElemento.textContent = `Total: $${total.toLocaleString()}`;
        }

        // ENVIAR POR WHATSAPP
        function enviarWhatsApp() {
            const nombre = document.getElementById('nombre').value;
            const nit = document.getElementById('nit').value;
            const celular = document.getElementById('celular').value;

            if(!nombre || !nit || !celular || carrito.length === 0) {
                alert('Completa todos los datos y agrega productos!');
                return;
            }

            let mensaje = `PEDIDO VIVA TEAM SHOP\n\nNombre: ${nombre}\nNIT/CC: ${nit}\nCelular: ${celular}\n\nProductos:\n`;
            carrito.forEach((item, i) => {
                mensaje += `${i+1}. ${item.nombre} - ${item.cantidad}u - $${(item.precio * item.cantidad).toLocaleString()}\n`;
            });
            mensaje += `\nTotal: $${(carrito.reduce((t, i) => t + i.precio * i.cantidad, 0)).toLocaleString()}`;

            window.open(`https://api.whatsapp.com/send?phone=+573006009881&text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        // MOSTRAR FACTURA EN MODAL
        function mostrarFactura() {
            const nombre = document.getElementById('nombre').value;
            const nit = document.getElementById('nit').value;
            const celular = document.getElementById('celular').value;

            if(!nombre || !nit || !celular || carrito.length === 0) {
                alert('Completa todos los datos!');
                return;
            }

            let contenido = `<div class="factura-titulo">FACTURA OFICIAL</div>`;
            contenido += `<div class="factura-linea">Fecha: ${new Date().toLocaleString()}</div>`;
            contenido += `<div class="factura-linea">Nombre: ${nombre}</div>`;
            contenido += `<div class="factura-linea">NIT/CC: ${nit}</div>`;
            contenido += `<div class="factura-linea">Celular: ${celular}</div>`;
            contenido += `<div class="factura-linea">------------------------</div>`;
            
            carrito.forEach((item, i) => {
                const subtotal = item.precio * item.cantidad;
                contenido += `<div class="factura-linea">${i+1}. ${item.nombre} - ${item.cantidad}u - $${subtotal.toLocaleString()}</div>`;
            });

            const total = carrito.reduce((t, i) => t + i.precio * i.cantidad, 0);
            contenido += `<div class="factura-total">TOTAL: $${total.toLocaleString()}</div>`;

            document.getElementById('factura-contenido').innerHTML = contenido;
            document.getElementById('modal-factura').style.display = 'flex';
        }

        // CERRAR MODAL
        function cerrarModal() {
            document.getElementById('modal-factura').style.display
