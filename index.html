<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Pedido y Factura</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
    <!-- Librerías para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Open Sans', sans-serif; }
        :root {
            --oro: #D4AF37;
            --verde: #25d366;
            --oscuro: #1A1A1A;
            --claro: #F8F8F8;
            --gris: #E0E0E0;
        }
        body { background: var(--claro); }
        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url(https://picsum.photos/1200/300?gold);
            background-size: cover;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        header h1 { font-size: 28px; border: 2px solid var(--oro); padding: 10px 20px; border-radius: 8px; }
        .contenedor { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: flex; flex-wrap: wrap; gap: 20px; }
        .productos { flex: 1 1 300px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .producto {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .producto img { width: 100%; height: 150px; object-fit: contain; }
        .producto button {
            background: var(--oro);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
        .carrito {
            flex: 1 1 300px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px;
            position: sticky;
            top: 20px;
        }
        .carrito h2 {
            background: var(--oro);
            color: white;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
        }
        .carrito-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--gris);
        }
        .selector-cantidad { display: flex; gap: 10px; margin: 0 10px; }
        .selector-cantidad i {
            background: var(--oro);
            color: white;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
            border-radius: 50%;
            cursor: pointer;
        }
        .carrito-item-cantidad { width: 30px; text-align: center; border: 1px solid var(--gris); border-radius: 4px; }
        .carrito-item-precio { margin-left: auto; font-weight: bold; color: var(--oro); }
        .btn-eliminar {
            color: red;
            border: 1px solid red;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
            border-radius: 50%;
            cursor: pointer;
            margin-left: 10px;
        }
        .form-datos input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid var(--gris);
            border-radius: 6px;
        }
        .total {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-top: 2px solid var(--oro);
            margin-top: 15px;
        }
        .btn-enviar {
            background: linear-gradient(90deg, var(--oro), var(--verde));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        .factura-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .factura-contenido {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
        }
        .factura-contenido h2 {
            color: var(--oro);
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--oro);
            padding-bottom: 10px;
        }
        .btn-accion {
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            width: 48%;
            font-size: 14px;
        }
        .btn-descargar {
            background: var(--oro);
            color: white;
            margin-right: 4%;
        }
        .btn-cerrar {
            background: red;
            color: white;
        }
        #factura-para-pdf {
            font-family: Arial, sans-serif;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header>
        <h1>Viva Team Shop - Joyería</h1>
    </header>

    <div class="contenedor">
        <!-- PRODUCTOS -->
        <div class="productos">
            <div class="producto">
                <h3>Pulso Oro 18k Lm</h3>
                <img src="https://picsum.photos/200/200?pulso" alt="Pulso">
                <p>Precio: $130.000</p>
                <button onclick="agregarAlCarrito(1, 'Pulso Oro 18k Lm', 130000, 'https://picsum.photos/200/200?pulso')">Agregar al Carrito</button>
            </div>
            <div class="producto">
                <h3>Oso Inglés 18k</h3>
                <img src="https://picsum.photos/200/200?oso" alt="Oso">
                <p>Precio: $210.000</p>
                <button onclick="agregarAlCarrito(2, 'Oso Inglés 18k', 210000, 'https://picsum.photos/200/200?oso')">Agregar al Carrito</button>
            </div>
            <div class="producto">
                <h3>Cadena Digen 18k</h3>
                <img src="https://picsum.photos/200/200?cadena" alt="Cadena">
                <p>Precio: $180.000</p>
                <button onclick="agregarAlCarrito(3, 'Cadena Digen 18k', 180000, 'https://picsum.photos/200/200?cadena')">Agregar al Carrito</button>
            </div>
        </div>

        <!-- CARRITO -->
        <div class="carrito">
            <h2>Tu Carrito</h2>
            <div id="carrito-items"></div>
            <div class="form-datos">
                <input type="text" id="nombre" placeholder="Nombre completo *">
                <input type="text" id="celular" placeholder="Celular *">
                <input type="text" id="nit" placeholder="NIT/CC para factura *">
                <input type="text" id="direccion" placeholder="Dirección *">
            </div>
            <div class="total">
                <span>Total a pagar:</span>
                <span id="total">$0</span>
            </div>
            <button class="btn-enviar" onclick="generarYEnviar()">Enviar Pedido & Generar Factura</button>
        </div>
    </div>

    <!-- MODAL DE FACTURA -->
    <div class="factura-modal" id="factura-modal">
        <div class="factura-contenido">
            <h2>FACTURA OFICIAL</h2>
            <div id="factura-para-pdf"></div>
            <button class="btn-accion btn-descargar" onclick="descargarFacturaPDF()">📥 Descargar como PDF</button>
            <button class="btn-accion btn-cerrar" onclick="cerrarModal()">❌ Cerrar</button>
        </div>
    </div>

    <script>
        let carrito = [];
        const carritoItems = document.getElementById('carrito-items');
        const totalElemento = document.getElementById('total');
        const facturaModal = document.getElementById('factura-modal');
        const facturaParaPDF = document.getElementById('factura-para-pdf');
        
        // Inicializar jsPDF
        let docPDF = null;

        // AGREGAR AL CARRITO - FUNCIÓN COMPLETA Y CORREGIDA
        function agregarAlCarrito(id, nombre, precio, imagen) {
            const productoExistente = carrito.find(p => p.id === id.toString());
            
            if (productoExistente) {
                productoExistente.cantidad++;
                alert(`✅ +1 ${nombre} | Total: ${productoExistente.cantidad}`);
            } else {
                carrito.push({
                    id: id.toString(),
                    nombre: nombre,
                    precio: parseInt(precio),
                    cantidad: 1,
                    imagen: imagen
                });
                alert(`✅ ${nombre} agregado al carrito!`);
            }
            
            actualizarCarrito();
        }

        // ACTUALIZAR CARRITO - FUNCIÓN COMPLETA
        function actualizarCarrito() {
            carritoItems.innerHTML = '';
            let totalGeneral = 0;

            if (carrito.length === 0) {
                carritoItems.innerHTML = '<p style="padding: 20px; text-align: center; color: #666;">Carrito vacío</p>';
                totalElemento.textContent = '$0';
                return;
            }

            carrito.forEach(producto => {
                const subtotal = producto.precio * producto.cantidad;
                totalGeneral += subtotal;

                const itemHTML = `
                    <div class="carrito-item">
                        <img src="${producto.imagen}" alt="${producto.nombre}" width="50" height="50">
                        <div>
                            <h4>${producto.nombre}</h4>
                            <div class="selector-cantidad">
                                <i class="fas fa-minus" onclick="cambiarCantidad(${producto.id}, 'restar')"></i>
                                <input type="text" value="${producto.cantidad}" readonly class="carrito-item-cantidad">
                                <i class="fas fa-plus" onclick="cambiarCantidad(${producto.id}, 'sumar')"></i>
                            </div>
                            <span class="carrito-item-precio">$${subtotal.toLocaleString()}</span>
                            <div class="btn-eliminar" onclick="eliminarProducto(${producto.id})">×</div>
                        </div>
                    </div>
                `;
                carritoItems.innerHTML += itemHTML;
            });

            totalElemento.textContent = `$${totalGeneral.toLocaleString()}`;
        }

        // CAMBIAR CANTIDAD
        function cambiarCantidad(id, accion) {
            const producto = carrito.find(p => p.id === id.toString());
            if (!producto) return;

            if (accion === 'sumar') {
                producto.cantidad++;
            } else if (producto.cantidad > 1) {
                producto.cantidad--;
            } else {
                eliminarProducto(id);
            }

            actualizarCarrito();
        }

        // ELIMINAR PRODUCTO
        function eliminarProducto(id) {
            const nombreProducto = carrito.find(p => p.id === id.toString()).nombre;
            carrito = carrito.filter(p => p.id !== id.toString());
            alert(`❌ ${nombreProducto} eliminado del carrito`);
            actualizarCarrito();
        }

        // GENERAR FACTURA Y ENVIAR
        function generarYEnviar() {
            const nombre = document.getElementById('nombre').value.trim();
            const celular = document.getElementById('celular').value.trim();
            const nit = document.getElementById('nit').value.trim();
            const direccion = document.getElementById('direccion').value.trim();

            if (!nombre || !celular || !nit || !direccion || carrito.length === 0) {
                alert('⚠️ Completa todos los campos obligatorios y agrega productos al carrito');
                return;
            }

            // DATOS DE LA FACTURA
            const fecha = new Date();
            const numFactura = `FAC-${fecha.getFullYear()}${(fecha.getMonth()+1).toString().padStart(2, '0')}${fecha.getDate().toString().padStart(2, '0')}-${Math.floor(Math.random() * 1000).toString().padStart(3, '0')}`;

            // CONTENIDO DE LA FACTURA
            let contenidoFactura = `
                <h3 style="text-align: center; margin-bottom: 15px;">VIVA TEAM SHOP</h3>
                <p><strong>Número de Factura:</strong> ${numFactura}</p>
                <p><strong>Fecha de Emisión:</strong> ${fecha.toLocaleDateString('es-CO')} ${fecha.toLocaleTimeString('es-CO')}</p>
                <p><strong>_______________________________________</strong></p>
                <p><strong>Datos del Cliente:</strong></p>
                <p>• Nombre: ${nombre}</p>
                <p>• Celular: ${celular}</p>
                <p>• NIT/CC: ${nit}</p>
                <p>• Dirección: ${direccion}</p>
                <p><strong>_______________________________________</strong></p>
                <p><strong>Detalles de la Compra:</strong></p>
            `;

            carrito.forEach((p, index) => {
                contenidoFactura += `
                    <p>${index + 1}. ${p.nombre}</p>
                    <p>   - Cantidad: ${p.cantidad} unidad(es)</p>
                    <p>   - Valor unitario:
