<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Joyería</title>
    
    <!-- Fuente + Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>emailjs.init('p_bYKh0pv5mfT4');</script> <!-- CAMBIA ESTO -->

    <!-- CSS ÚNICO -->
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <!-- Botón WhatsApp -->
    <a href="https://api.whatsapp.com/send?phone=+573006009881" class="btn-wsp" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <!-- Header -->
    <header>
        <h1>V I V A    T E A M    S H O P</h1>
        <p>Joyería de Oro 18k - Calidad Garantizada</p>
    </header>

    <!-- Contenedor Principal -->
    <div class="contenedor">
        <!-- Productos -->
        <div class="contenedor-items" id="contenedor-productos">
            <!-- Productos cargados automáticamente -->
        </div>

        <!-- Carrito -->
        <div class="carrito" id="carrito">
            <div class="header-carrito">
                <h2>Tu Carrito</h2>
            </div>

            <div class="carrito-items" id="carrito-items">
                <p style="text-align:center; padding:20px;">El carrito está vacío</p>
            </div>

            <div class="carrito-total">
                <div class="fila">
                    <strong>Subtotal:</strong>
                    <span id="subtotal">$0</span>
                </div>
                <div class="fila">
                    <strong>Total:</strong>
                    <span id="total">$0</span>
                </div>
            </div>

            <!-- Formulario -->
            <form class="formulario-cliente" id="formulario">
                <label>Nombre completo:</label>
                <input type="text" id="nombre" required placeholder="Juan Pérez">

                <label>Correo electrónico:</label>
                <input type="email" id="correo" required placeholder="juan@ejemplo.com">

                <label>Teléfono:</label>
                <input type="tel" id="telefono" required placeholder="+57 300 123 4567">

                <label>Mensaje adicional:</label>
                <textarea id="mensaje" placeholder="Especifica detalles..."></textarea>

                <button type="button" class="btn-pagar" onclick="enviarPedido()">
                    <span>Enviar Pedido</span>
                    <i class="fa-solid fa-cart-shopping"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Viva Team Shop - Todos los derechos reservados</p>
        <p>Contacto: <a href="https://api.whatsapp.com/send?phone=+573006009881">+57 300 600 9881</a></p>
    </footer>

    <!-- JS ÚNICO -->
    <script src="js/app.js"></script>
</body>
</html>
