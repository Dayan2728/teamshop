    <script>
        // Referencias a elementos de la página
        const btnGenerarFactura = document.getElementById('btnGenerarFactura');
        const areaFactura = document.getElementById('areaFactura');
        const contenidoFactura = document.getElementById('contenidoFactura');
        const btnDescargarFactura = document.getElementById('btnDescargarFactura');
        const { jsPDF } = window.jspdf;

        // Función para obtener los productos y totales del carrito
        function obtenerDatosCarrito() {
            const items = document.querySelectorAll('.carrito-item');
            let productos = [];
            items.forEach(item => {
                // Obtener datos de cada producto
                const nombre = item.querySelector('.carrito-item-titulo').textContent;
                const precioTexto = item.querySelector('.carrito-item-precio').textContent;
                const cantidad = item.querySelector('.carrito-item-cantidad').value;
                // Calcular subtotal
                const precioNumerico = parseFloat(precioTexto.replace('$', '').replace('.', ''));
                const subtotal = precioNumerico * parseInt(cantidad);
                
                productos.push({
                    nombre: nombre,
                    precio: precioTexto,
                    cantidad: cantidad,
                    subtotal: "$" + subtotal.toLocaleString('es-CO')
                });
            });
            return {
                productos: productos,
                total: document.querySelector('.carrito-precio-total').textContent
            };
        }

        // CUANDO SE HACE CLIC EN "GENERAR FACTURA IA"
        btnGenerarFactura.addEventListener('click', () => {
            // Obtener datos de los campos obligatorios
            const nombre = document.getElementById('datoNombre').value.trim();
            const direccion = document.getElementById('datoDireccion').value.trim();
            const ciudad = document.getElementById('datoCiudad').value.trim();
            const telefono = document.getElementById('datoTelefono').value.trim();
            const detalles = document.getElementById('datoMensaje').value.trim();
            const { productos, total } = obtenerDatosCarrito();

            // Validar que todo esté completo
            if (!nombre || !direccion || !ciudad || !telefono || productos.length === 0) {
                alert('⚠️ Completa todos los campos obligatorios y agrega productos al carrito!');
                return;
            }

            // CREAR EL CONTENIDO DE LA FACTURA
            const facturaHTML = `
                <div style="font-family: Arial, sans-serif;">
                    <h2 style="text-align: center; color: #25d366; margin-bottom: 0;">VIVA TEAM SHOP</h2>
                    <p style="text-align: center; margin-top: 0;">Barranquilla, Atlántico - Colombia</p>
                    <hr style="border: 1px solid #25d366;">
                    
                    <h3 style="color: #333;">📋 DATOS DEL CLIENTE</h3>
                    <p><strong>Nombre:</strong> ${nombre}</p>
                    <p><strong>Dirección:</strong> ${direccion}</p>
                    <p><strong>Ciudad:</strong> ${ciudad}</p>
                    <p><strong>Teléfono:</strong> ${telefono}</p>
                    <p><strong>Fecha:</strong> ${new Date().toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                    ${detalles ? `<p><strong>Detalles adicionales:</strong> ${detalles}</p>` : ''}
                    <hr style="border: 1px solid #25d366;">
                    
                    <h3 style="color: #333;">🛒 DETALLE DE PRODUCTOS</h3>
                    <table>
                        <thead>
                            <tr style="background-color: #f8f9fa;">
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Precio Unitario</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${productos.map(item => `
                                <tr>
                                    <td>${item.nombre}</td>
                                    <td>${item.cantidad}</td>
                                    <td>${item.precio}</td>
                                    <td>${item.subtotal}</td>
                                </tr>
                            `).join('')}
                            <tr style="font-weight: bold; background-color: #f8f9fa;">
                                <td colspan="3">TOTAL A PAGAR</td>
                                <td>${total}</td>
                            </tr>
                        </tbody>
                    </table>
                    <hr style="border: 1px solid #25d366;">
                    
                    <p style="text-align: center; font-style: italic;">Gracias por tu compra! 🛍️</p>
                </div>
            `;

            // MOSTRAR LA FACTURA EN LA PÁGINA
            contenidoFactura.innerHTML = facturaHTML;
            areaFactura.style.display = 'block';
        });

        // CUANDO SE HACE CLIC EN "DESCARGAR PDF"
        btnDescargarFactura.addEventListener('click', () => {
            const nombreCliente = document.getElementById('datoNombre').value.trim();
            const doc = new jsPDF();

            // TÍTULO DEL PDF
            doc.setFontSize(16);
            doc.setTextColor(37, 211, 102);
            doc.text("FACTURA VIVA TEAM SHOP", 105, 15, null, null, 'center');
            doc.setFontSize(10);
            doc.setTextColor(0);
            doc.text("Barranquilla, Atlántico - Colombia", 105, 25, null, null, 'center');
            doc.line(10, 30, 200, 30); // Línea separadora

            // DATOS DEL CLIENTE
            doc.setFontSize(12);
            doc.text("📋 DATOS DEL CLIENTE", 10, 45);
            doc.setFontSize(10);
            doc.text(`Nombre: ${document.getElementById('datoNombre').value.trim()}`, 10, 55);
            doc.text(`Dirección: ${document.getElementById('datoDireccion').value.trim()}`, 10, 65);
            doc.text(`Ciudad: ${document.getElementById('datoCiudad').value.trim()}`, 10, 75);
            doc.text(`Teléfono: ${document.getElementById('datoTelefono').value.trim()}`, 10, 85);
            doc.text(`Fecha: ${new Date().toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' })}`, 10, 95);
            if (document.getElementById('datoMensaje').value.trim()) {
                doc.text(`Detalles: ${document.getElementById('datoMensaje').value.trim()}`, 10, 105);
            }
            doc.line(10, 115, 200, 115);

            // DETALLE DE PRODUCTOS
            doc.setFontSize(12);
            doc.text("🛒 DETALLE DE PRODUCTOS", 10, 130);
            doc.setFontSize(10);
            // Encabezados de tabla
            doc.text("Producto", 10, 145);
            doc.text("Cant.", 70, 145);
            doc.text("Precio Unit.", 100, 145);
            doc.text("Subtotal", 150, 145);
            doc.line(10, 150, 200, 150);
            // Productos
            const { productos, total } = obtenerDatosCarrito();
            let yPos = 160;
            productos.forEach(item => {
                doc.text(item.nombre.substring(0, 20) + (item.nombre.length > 20 ? '...' : ''), 10, yPos);
                doc.text(item.cantidad, 70, yPos);
                doc.text(item.precio, 100, yPos);
                doc.text(item.subtotal, 150, yPos);
                yPos += 10;
            });
            doc.line(10, yPos, 200, yPos);
            yPos += 5;
            doc.setFontWeight('bold');
            doc.text("TOTAL A PAGAR", 100, yPos);
            doc.text(total, 150, yPos);
            doc.setFontWeight('normal');

            // PIE DE PÁGINA
            doc.setFontSize(9);
            doc.setTextColor(100);
            doc.text("Gracias por tu compra! 🛍️", 105, 270, null, null, 'center');

            // GUARDAR EL PDF
            doc.save(`Factura_VivaTeamShop_${nombreCliente.replace(/\s+/g, '_')}.pdf`);
        });
    </script>
    <!-- ============================== -->
    <!-- FIN DEL CÓDIGO NUEVO -->
    <!-- ============================== -->

</body>
</html>
