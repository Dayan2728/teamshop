<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Joyería</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        header {
            background: #D4AF37;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .productos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .producto {
            background: white;
            margin: 10px;
            padding: 15px;
            border-radius: 8px;
            width: 200px;
            text-align: center;
        }

        .producto img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }

        .producto h3 {
            color: #333;
            margin: 10px 0;
        }

        .producto p {
            color: #D4AF37;
            font-weight: bold;
            font-size: 18px;
        }

        .producto button {
            background: #D4AF37;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .carrito {
            background: white;
            margin: 0 20px 20px;
            padding: 20px;
            border-radius: 8px;
        }

        .carrito h2 {
            color: #D4AF37;
            text-align: center;
            margin-top: 0;
        }

        #lista-carrito {
            margin: 15px 0;
        }

        .item-carrito {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .carrito input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        #total {
            font-size: 20px;
            font-weight: bold;
            text-align: right;
            margin: 15px 0;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-whatsapp { background: #25d366; }
        .btn-pdf { background: #007bff; }
    </style>
</head>
<body>
    <header>VIVA TEAM SHOP - JOYERÍA</header>

    <!-- PRODUCTOS -->
    <div class="productos">
        <div class="producto">
            <h3>Pulso Oro 18k</h3>
            <img src="https://cdn.pixabay.com/photo/2016/03/31/19/50/jewelry-1295966_640.jpg" alt="Pulso Oro">
            <p>$130.000</p>
            <button onclick="agregar(1, 'Pulso Oro 18k', 130000)">Agregar</button>
        </div>

        <div class="producto">
            <h3>Oso Inglés 18k</h3>
            <img src="https://cdn.pixabay.com/photo/2017/10/25/18/34/gold-2888450_640.jpg" alt="Oso Inglés">
            <p>$210.000</p>
            <button onclick="agregar(2, 'Oso Inglés 18k', 210000)">Agregar</button>
        </div>

        <div class="producto">
            <h3>Cadena Digen 18k</h3>
            <img src="https://cdn.pixabay.com/photo/2018/05/08/08/45/gold-3382509_640.jpg" alt="Cadena Digen">
            <p>$180.000</p>
            <button onclick="agregar(3, 'Cadena Digen 18k', 180000)">Agregar</button>
        </div>

        <div class="producto">
            <h3>Cadena Figaro 18k</h3>
            <img src="https://cdn.pixabay.com/photo/2017/10/25/19/05/chain-2888453_640.jpg" alt="Cadena Figaro">
            <p>$220.000</p>
            <button onclick="agregar(4, 'Cadena Figaro 18k', 220000)">Agregar</button>
        </div>
    </div>

    <!-- CARRITO -->
    <div class="carrito">
        <h2>CARRITO</h2>
        <div id="lista-carrito">Carrito vacío</div>
        <input type="text" id="nombre" placeholder="Tu nombre">
        <input type="text" id="nit" placeholder="NIT/CC">
        <input type="text" id="celular" placeholder="Celular">
        <div id="total">Total: $0</div>
        <button class="btn btn-whatsapp" onclick="enviar()">Enviar WhatsApp</button>
        <button class="btn btn-pdf" onclick="descargar()">Descargar PDF</button>
    </div>

    <!-- LIBRERÍA PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // VARIABLES BASICAS
        let carrito = [];
        let total = 0;
        const { jsPDF } = window.jspdf;

        // FUNCIÓN AGREGAR AL CARRITO
        function agregar(id, nombre, precio) {
            // BUSCAR SI EXISTE
            let existe = carrito.find(item => item.id == id);
            
            if(existe) {
                existe.cantidad++;
            } else {
                carrito.push({id: id, nombre: nombre, precio: precio, cantidad: 1});
            }

            // ACTUALIZAR CARRITO EN PANTALLA
            mostrarCarrito();
            alert(nombre + " agregado!");
        }

        // FUNCIÓN MOSTRAR CARRITO
        function mostrarCarrito() {
            let lista = document.getElementById('lista-carrito');
            let texto = "";
            total = 0;

            if(carrito.length == 0) {
                texto = "Carrito vacío";
            } else {
                carrito.forEach(item => {
                    let subtotal = item.precio * item.cantidad;
                    total += subtotal;
                    texto += "<div class='item-carrito'>" + item.nombre + " (" + item.cantidad + "u) - $" + subtotal + "</div>";
                });
            }

            lista.innerHTML = texto;
            document.getElementById('total').innerHTML = "Total: $" + total;
        }

        // FUNCIÓN ENVIAR WHATSAPP
        function enviar() {
            let nombre = document.getElementById('nombre').value;
            let nit = document.getElementById('nit').value;
            let celular = document.getElementById('celular').value;

            if(nombre == "" || nit == "" || celular == "" || carrito.length == 0) {
                alert("Completa todos los datos!");
                return;
            }

            let mensaje = "PEDIDO VIVA TEAM SHOP\n\n";
            mensaje += "Nombre: " + nombre + "\n";
            mensaje += "NIT/CC: " + nit + "\n";
            mensaje += "Celular: " + celular + "\n\n";
            mensaje += "PRODUCTOS:\n";

            carrito.forEach(item => {
                mensaje += "- " + item.nombre + " (" + item.cantidad + "u) - $" + (item.precio * item.cantidad) + "\n";
            });

            mensaje += "\nTOTAL: $" + total;

            window.open("https://api.whatsapp.com/send?phone=+573006009881&text=" + encodeURIComponent(mensaje));
        }

        // FUNCIÓN DESCARGAR PDF
        function descargar() {
            let nombre = document.getElementById('nombre').value;
            let nit = document.getElementById('nit').value;
            let celular = document.getElementById('celular').value;

            if(nombre == "" || nit == "" || celular == "" || carrito.length == 0) {
                alert("Completa todos los datos!");
                return;
            }

            let pdf = new jsPDF();
            pdf.text("FACTURA VIVA TEAM SHOP", 10, 10);
            pdf.text("------------------------", 10, 15);
            pdf.text("Nombre: " + nombre, 10, 25);
            pdf.text("NIT/CC: " + nit, 10, 35);
            pdf.text("Celular: " + celular, 10, 45);
            pdf.text("------------------------", 10, 55);
            pdf.text("PRODUCTOS:", 10, 65);

            let y = 75;
            carrito.forEach(item => {
                pdf.text("- " + item.nombre + " (" + item.cantidad + "u) - $" + (item.precio * item.cantidad), 10, y);
                y += 10;
            });

            pdf.text("------------------------", 10, y+5);
            pdf.text("TOTAL: $" + total, 10, y+15);
            pdf.save("Factura-VivaTeamShop.pdf");
        }
    </script>
</body>
</html>
