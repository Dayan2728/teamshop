<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Carrito Simple</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        header { background: #D4AF37; color: white; padding: 20px; text-align: center; }
        .contenedor { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .producto { background: white; padding: 15px; border-radius: 8px; text-align: center; }
        .producto img { width: 100%; height: 150px; object-fit: contain; }
        .producto button { background: #D4AF37; color: white; border: none; padding: 10px; border-radius: 4px; width: 100%; cursor: pointer; }
        .carrito { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .carrito h2 { text-align: center; margin-bottom: 20px; color: #D4AF37; }
        .carrito-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .formulario input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
        .total { font-size: 20px; font-weight: bold; margin: 15px 0; text-align: right; }
        .btn-enviar { background: #25d366; color: white; border: none; padding: 15px; border-radius: 4px; width: 100%; cursor: pointer; font-size: 16px; }
        .btn-descargar { background: #D4AF37; color: white; border: none; padding: 10px; border-radius: 4px; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>VIVA TEAM SHOP</h1>
    </header>

    <div class="contenedor">
        <!-- PRODUCTOS -->
        <div class="productos">
            <div class="producto">
                <h3>Pulso Oro 18k</h3>
                <img src="https://picsum.photos/200/200?pulso" alt="Pulso">
                <p>Precio: $130.000</p>
                <button onclick="agregar(1, 'Pulso Oro 18k', 130000)">Agregar</button>
            </div>
            <div class="producto">
                <h3>Oso Inglés 18k</h3>
                <img src="https://picsum.photos/200/200?oso" alt="Oso">
                <p>Precio: $210.000</p>
                <button onclick="agregar(2, 'Oso Inglés 18k', 210000)">Agregar</button>
            </div>
            <div class="producto">
                <h3>Cadena Digen 18k</h3>
                <img src="https://picsum.photos/200/200?cadena" alt="Cadena">
                <p>Precio: $180.000</p>
                <button onclick="agregar(3, 'Cadena Digen 18k', 180000)">Agregar</button>
            </div>
        </div>

        <!-- CARRITO Y FACTURA -->
        <div class="carrito">
            <h2>CARRITO</h2>
            <div id="carrito-lista"></div>
            <div class="formulario">
                <input type="text" id="nombre" placeholder="Nombre *">
                <input type="text" id="nit" placeholder="NIT/CC *">
                <input type="text" id="celular" placeholder="Celular *">
            </div>
            <div class="total" id="total">Total: $0</div>
            <button class="btn-enviar" onclick="enviar()">Enviar Pedido</button>
            <button class="btn-descargar" onclick="descargarPDF()">Descargar Factura</button>
        </div>
    </div>

    <script>
        let carrito = [];
        let total = 0;

        // AGREGAR AL CARRITO
        function agregar(id, nombre, precio) {
            // BUSCAR SI EXISTE
            let existe = false;
            for (let i = 0; i < carrito.length; i++) {
                if (carrito[i].id === id) {
                    carrito[i].cantidad++;
                    existe = true;
                    break;
                }
            }

            // SI NO EXISTE, AGREGAR NUEVO
            if (!existe) {
                carrito.push({ id: id, nombre: nombre, precio: precio, cantidad: 1 });
            }

            // ACTUALIZAR CARRITO
            mostrarCarrito();
        }

        // MOSTRAR CARRITO
        function mostrarCarrito() {
            const lista = document.getElementById('carrito-lista');
            lista.innerHTML = '';
            total = 0;

            if (carrito.length === 0) {
                lista.innerHTML = '<p style="text-align:center; padding:20px; color:#666;">Carrito vacío</p>';
                document.getElementById('total').textContent = 'Total: $0';
                return;
            }

            // RECORRER CARRITO
            for (let i = 0; i < carrito.length; i++) {
                const item = carrito[i];
                const subtotal = item.precio * item.cantidad;
                total += subtotal;

                // CREAR ELEMENTO
                const div = document.createElement('div');
                div.className = 'carrito-item';
                div.innerHTML = `
                    <span>${item.nombre} (${item.cantidad}u)</span>
                    <span>$${subtotal.toLocaleString()}</span>
                    <button onclick="quitar(${item.id})" style="background:red; color:white; border:none; padding:5px 10px; border-radius:4px;">-</button>
                `;
                lista.appendChild(div);
            }

            // ACTUALIZAR TOTAL
            document.getElementById('total').textContent = `Total: $${total.toLocaleString()}`;
        }

        // QUITAR PRODUCTO
        function quitar(id) {
            for (let i = 0; i < carrito.length; i++) {
                if (carrito[i].id === id) {
                    carrito[i].cantidad--;
                    if (carrito[i].cantidad === 0) {
                        carrito.splice(i, 1);
                    }
                    break;
                }
            }
            mostrarCarrito();
        }

        // ENVIAR POR WHATSAPP
        function enviar() {
            const nombre = document.getElementById('nombre').value;
            const nit = document.getElementById('nit').value;
            const celular = document.getElementById('celular').value;

            if (!nombre || !nit || !celular || carrito.length === 0) {
                alert('Completa todos los campos');
                return;
            }

            let mensaje = `PEDIDO VIVA TEAM SHOP\n\n`;
            mensaje += `Nombre: ${nombre}\n`;
            mensaje += `NIT/CC: ${nit}\n`;
            mensaje += `Celular: ${celular}\n\n`;
            mensaje += `DETALLES:\n`;
            
            for (let i = 0; i < carrito.length; i++) {
                const item = carrito[i];
                mensaje += `${item.nombre} - ${item.cantidad}u - $${(item.precio*item.cantidad).toLocaleString()}\n`;
            }
            mensaje += `\nTOTAL: $${total.toLocaleString()}`;

            window.open(`https://api.whatsapp.com/send?phone=+573006009881&text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        // DESCARGAR PDF
        function descargarPDF() {
            const nombre = document.getElementById('nombre').value;
            const nit = document.getElementById('nit').value;
            const celular = document.getElementById('celular').value;

            if (!nombre || !nit || !celular || carrito.length === 0) {
                alert('Completa los campos primero');
                return;
            }

            // CREAR CONTENIDO DEL PDF
            let contenido = `FACTURA VIVA TEAM SHOP\n\n`;
            contenido += `Nombre: ${nombre}\n`;
            contenido += `NIT/CC: ${nit}\n`;
            contenido += `Celular: ${celular}\n\n`;
            contenido += `DETALLES DE COMPRA:\n`;
            
            for (let i = 0; i < carrito.length; i++) {
                const item = carrito[i];
                contenido += `${item.nombre} - ${item.cantidad}u - $${(item.precio*item.cantidad).toLocaleString()}\n`;
            }
            contenido += `\nTOTAL: $${total.toLocaleString()}`;

            // CREAR ARCHIVO DE TEXTO Y DESCARGAR
            const blob = new Blob([contenido], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Factura-VivaTeamShop-${new Date().toLocaleDateString()}.pdf`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // INICIALIZAR
        mostrarCarrito();
    </script>
</body>
</html>
