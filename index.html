<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Carrito Funcional</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        header { background: #D4AF37; color: white; padding: 20px; text-align: center; }
        .contenedor { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .producto { background: white; padding: 15px; border-radius: 8px; text-align: center; }
        .producto img { width: 100%; height: 150px; object-fit: contain; }
        .producto button { background: #D4AF37; color: white; border: none; padding: 10px; border-radius: 4px; width: 100%; margin-top: 10px; cursor: pointer; }
        .carrito { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .carrito h2 { color: #D4AF37; text-align: center; margin-bottom: 20px; }
        .carrito-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .form-datos input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
        .total { font-size: 20px; font-weight: bold; margin: 15px 0; text-align: right; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-enviar { background: #25d366; }
        .btn-ver { background: #D4AF37; }
        .btn-descargar { background: #007bff; }

        /* MODAL DE FACTURA */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-contenido { background: white; width: 90%; max-width: 500px; padding: 20px; border-radius: 8px; }
        .cerrar-modal { background: red; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>VIVA TEAM SHOP - JOYERÍA</h1>
    </header>

    <div class="contenedor">
        <!-- PRODUCTOS -->
        <div class="productos">
            <div class="producto">
                <h3>Pulso Oro 18k</h3>
                <img src="https://picsum.photos/200/200?pulso" alt="Pulso">
                <p>Precio: $130.000</p>
                <button onclick="agregar(1, 'Pulso Oro 18k', 130000)">Agregar al Carrito</button>
            </div>
            <div class="producto">
                <h3>Oso Inglés 18k</h3>
                <img src="https://picsum.photos/200/200?oso" alt="Oso">
                <p>Precio: $210.000</p>
                <button onclick="agregar(2, 'Oso Inglés 18k', 210000)">Agregar al Carrito</button>
            </div>
            <div class="producto">
                <h3>Cadena Digen 18k</h3>
                <img src="https://picsum.photos/200/200?cadena" alt="Cadena">
                <p>Precio: $180.000</p>
                <button onclick="agregar(3, 'Cadena Digen 18k', 180000)">Agregar al Carrito</button>
            </div>
        </div>

        <!-- CARRITO -->
        <div class="carrito">
            <h2>CARRITO DE COMPRAS</h2>
            <div id="lista-carrito"></div>
            <div class="form-datos">
                <input type="text" id="nombre" placeholder="Tu nombre *">
                <input type="text" id="nit" placeholder="NIT/CC *">
                <input type="text" id="celular" placeholder="Celular *">
            </div>
            <div class="total" id="total">Total: $0</div>
            <button class="btn btn-enviar" onclick="enviarPedido()">Enviar Pedido por WhatsApp</button>
            <button class="btn btn-ver" onclick="verFactura()">Ver Factura</button>
            <button class="btn btn-descargar" onclick="descargarComoPDF()">Descargar PDF</button>
        </div>
    </div>

    <!-- MODAL FACTURA -->
    <div class="modal" id="modal-factura">
        <div class="modal-contenido">
            <h2 style="text-align:center; color:#D4AF37; margin-bottom:20px;">FACTURA OFICIAL</h2>
            <div id="contenido-factura"></div>
            <button class="cerrar-modal" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script>
        let carrito = [];
        let total = 0;

        // AGREGAR AL CARRITO
        function agregar(id, nombre, precio) {
            const prod = carrito.find(p => p.id === id);
            if (prod) {
                prod.cantidad++;
            } else {
                carrito.push({id: id, nombre: nombre, precio: precio, cantidad: 1});
            }
            actualizarCarrito();
        }

        // ACTUALIZAR CARRITO
        function actualizarCarrito() {
            const lista = document.getElementById('lista-carrito');
            lista.innerHTML = '';
            total = 0;

            if (carrito.length === 0) {
                lista.innerHTML = '<p style="text-align:center; padding:20px; color:#666;">Carrito vacío</p>';
                document.getElementById('total').textContent = 'Total: $0';
                return;
            }

            carrito.forEach(p => {
                const subtotal = p.precio * p.cantidad;
                total += subtotal;
                lista.innerHTML += `<div class="carrito-item"><span>${p.nombre} (${p.cantidad}u)</span><span>$${subtotal.toLocaleString()}</span></div>`;
            });

            document.getElementById('total').textContent = `Total: $${total.toLocaleString()}`;
        }

        // ENVIAR PEDIDO
        function enviarPedido() {
            const nombre = document.getElementById('nombre').value;
            const nit = document.getElementById('nit').value;
            const celular = document.getElementById('celular').value;

            if (!nombre || !nit || !celular || carrito.length === 0) {
                alert('Completa todos los datos primero');
                return;
            }

            let msg = `PEDIDO VIVA TEAM SHOP\n\nNombre: ${nombre}\nNIT/CC: ${nit}\nCelular: ${celular}\n\n`;
            carrito.forEach(p => msg += `${p.nombre} - ${p.cantidad}u - $${(p.precio*p.cantidad).toLocaleString()}\n`);
            msg += `\nTOTAL: $${total.toLocaleString()}`;

            window.open(`https://api.whatsapp.com/send?phone=+573006009881&text=${encodeURIComponent(msg)}`, '_blank');
        }

        // VER FACTURA EN MODAL
        function verFactura() {
            const nombre = document.getElementById('nombre').value;
            const nit = document.getElementById('nit').value;
            const celular = document.getElementById('celular').value;

            if (!nombre || !nit || !celular || carrito.length === 0) {
                alert('Completa los datos primero');
                return;
            }

            const contenido = document.getElementById('contenido-factura');
            let texto = `
                <p><strong>Fecha:</strong> ${new Date().toLocaleDateString('es-CO')}</p>
                <p><strong>Nombre:</strong> ${nombre}</p>
                <p><strong>NIT/CC:</strong> ${nit}</p>
                <p><strong>Celular:</strong> ${celular}</p>
                <hr>
                <h3 style="margin:15px 0;">Detalles de Compra:</h3>
            `;

            carrito.forEach((p, i) => {
                texto += `<p>${i+1}. ${p.nombre} - ${p.cantidad} unidad(es) - $${(p.precio*p.cantidad).toLocaleString()}</p>`;
            });

            texto += `<hr><p style="font-size:20px; font-weight:bold;">TOTAL: $${total.toLocaleString()}</p>`;
            texto += `<p style="text-align:center; margin-top:20px;">¡Gracias por tu compra!</p>`;

            contenido.innerHTML = texto;
            document.getElementById('modal-factura').style.display = 'flex';
        }

        // CERRAR MODAL
        function cerrarModal() {
            document.getElementById('modal-factura').style.display = 'none';
        }

        // DESCARGAR COMO PDF (OPCIÓN 1: CAPTURA DEL MODAL)
        function descargarComoPDF() {
            verFactura(); // Primero mostramos la factura
            
            // Usamos html2canvas para convertir el modal a imagen y luego a PDF
            html2canvas(document.querySelector('.modal-contenido')).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF();
                pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);
                pdf.save(`Factura-VivaTeamShop-${new Date().getDate()}.pdf`);
                cerrarModal();
            });
        }
    </script>

    <!-- LIBRERÍAS PARA PDF REAL -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
