<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Joyería</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #f8f8f8; }
        
        /* HEADER */
        header { background: #D4AF37; color: white; padding: 15px 0; text-align: center; font-size: 18px; font-weight: bold; }
        
        /* PRODUCTOS */
        .productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; padding: 15px; }
        .producto { background: white; border-radius: 8px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .producto img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover; 
            border-radius: 6px; 
            background: #f0f0f0; /* Fondo uniforme */
            padding: 5px;
        }
        .producto h3 { font-size: 16px; margin: 10px 0 5px; color: #333; }
        .producto p { font-size: 15px; color: #555; margin-bottom: 10px; }
        .producto button { 
            width: 100%; 
            padding: 8px; 
            background: #D4AF37; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
            font-size: 14px;
        }
        
        /* CARRITO */
        .carrito { background: white; margin: 0 15px 20px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .carrito h2 { color: #D4AF37; text-align: center; margin-bottom: 15px; font-size: 20px; }
        .carrito-item { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 15px; }
        .form-datos input { 
            width: 100%; 
            padding: 10px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            font-size: 15px;
        }
        .total { font-size: 18px; font-weight: bold; margin: 15px 0; text-align: right; color: #333; }
        .btn { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 4px; 
            color: white; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 8px;
        }
        .btn-enviar { background: #25d366; }
        .btn-ver { background: #D4AF37; }
        .btn-descargar { background: #007bff; }
        
        /* MODAL FACTURA */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        .modal-contenido { 
            background: white; 
            width: 100%; 
            max-width: 500px; 
            padding: 25px; 
            border-radius: 8px; 
            font-size: 15px;
        }
        .modal-contenido h2 { 
            text-align: center; 
            color: #D4AF37; 
            margin-bottom: 20px; 
            padding-bottom: 10px; 
            border-bottom: 2px solid #D4AF37;
        }
        .factura-linea { margin: 8px 0; padding-bottom: 5px; border-bottom: 1px dashed #ddd; }
        .factura-total { 
            font-size: 20px; 
            font-weight: bold; 
            margin: 20px 0; 
            text-align: right; 
            color: #D4AF37;
        }
    </style>
    <!-- Librerías 100% confiables para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header>VIVA TEAM SHOP - JOYERÍA</header>

    <div class="productos">
        <div class="producto">
            <h3>Pulso Oro 18k</h3>
            <!-- Imágenes de joyería profesional -->
            <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" alt="Pulso Oro 18k">
            <p>Precio: $130.000</p>
            <button onclick="agregar(1, 'Pulso Oro 18k', 130000)">Agregar al Carrito</button>
        </div>
        <div class="producto">
            <h3>Oso Inglés 18k</h3>
            <img src="https://images.unsplash.com/photo-1551524905-142875a901a1?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" alt="Oso Inglés 18k">
            <p>Precio: $210.000</p>
            <button onclick="agregar(2, 'Oso Inglés 18k', 210000)">Agregar al Carrito</button>
        </div>
        <div class="producto">
            <h3>Cadena Digen 18k</h3>
            <img src="https://images.unsplash.com/photo-1549925245-100ddd75af48?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" alt="Cadena Digen 18k">
            <p>Precio: $180.000</p>
            <button onclick="agregar(3, 'Cadena Digen 18k', 180000)">Agregar al Carrito</button>
        </div>
    </div>

    <div class="carrito">
        <h2>CARRITO DE COMPRAS</h2>
        <div id="lista-carrito"></div>
        <div class="form-datos">
            <input type="text" id="nombre" placeholder="Tu nombre *">
            <input type="text" id="nit" placeholder="NIT/CC *">
            <input type="text" id="celular" placeholder="Celular *">
        </div>
        <div class="total" id="total">Total: $0</div>
        <button class="btn btn-enviar" onclick="enviarPedido()">Enviar Pedido por WhatsApp</button>
        <button class="btn btn-ver" onclick="verFactura()">Ver Factura</button>
        <button class="btn btn-descargar" onclick="descargarPDF()">Descargar PDF</button>
    </div>

    <!-- MODAL FACTURA -->
    <div class="modal" id="modal-factura">
        <div class="modal-contenido" id="contenido-modal">
            <h2>FACTURA OFICIAL</h2>
            <div id="factura-detalle"></div>
        </div>
    </div>

    <script>
        let carrito = [];
        let total = 0;
        const { jsPDF } = window.jspdf;

        // AGREGAR AL CARRITO
        function agregar(id, nombre, precio) {
            const prod = carrito.find(p => p.id === id);
            if (prod) {
                prod.cantidad++;
            } else {
                carrito.push({id: id, nombre: nombre, precio: precio, cantidad: 1});
            }
            actualizarCarrito();
        }

        // ACTUALIZAR CARRITO
        function actualizarCarrito() {
            const lista = document.getElementById('lista-carrito');
            lista.innerHTML = '';
            total = 0;

            if (carrito.length === 0) {
                lista.innerHTML = '<p style="text-align:center; padding:15px; color:#666;">Carrito vacío</p>';
                document.getElementById('total').textContent = 'Total: $0';
                return;
            }

            carrito.forEach(p => {
                const subtotal = p.precio * p.cantidad;
                total += subtotal;
                lista.innerHTML += `<div class="carrito-item"><span>${p.nombre} (${p.cantidad}u)</span><span>$${subtotal.toLocaleString()}</span></div>`;
            });

            document.getElementById('total').textContent = `Total: $${total.toLocaleString()}`;
        }

        // ENVIAR PEDIDO
        function enviarPedido() {
            const nombre = document.getElementById('nombre').value;
            const nit = document.getElementById('nit').value;
            const celular = document.getElementById('celular').value;

            if (!nombre || !nit || !celular || carrito.length === 0) {
                alert('Completa todos los datos primero');
                return;
            }

            let msg = `PEDIDO VIVA TEAM SHOP\n\nNombre: ${nombre}\nNIT/CC: ${nit}\nCelular: ${celular}\n\n`;
            carrito.forEach(p => msg += `${p.nombre} - ${p.cantidad}u - $${(p.precio*p.cantidad).toLocaleString()}\n`);
            msg += `\nTOTAL: $${total.toLocaleString()}`;

            window.open(`https://api.whatsapp.com/send?phone=+573006009881&text=${encodeURIComponent(msg)}`, '_blank');
        }

        // VER FACTURA
        function verFactura() {
            const nombre = document.getElementById('nombre').value;
            const nit = document.getElementById('nit').value;
            const celular = document.getElementById('celular').value;

            if (!nombre || !nit || !celular || carrito.length === 0) {
                alert('Completa los datos primero');
                return;
            }

            const detalle = document.getElementById('factura-detalle');
            let contenido = `
                <div class="factura-linea"><strong>Fecha:</strong> ${new Date().toLocaleDateString('es-CO')} ${new Date().toLocaleTimeString('es-CO')}</div>
                <div class="factura-linea"><strong>Nombre:</strong> ${nombre}</div>
                <div class="factura-linea"><strong>NIT/CC:</strong> ${nit}</div>
                <div class="factura-linea"><strong>Celular:</strong> ${celular}</div>
                <h3 style="margin:15px 0;">DETALLES DE COMPRA:</h3>
            `;

            carrito.forEach((p, i) => {
                contenido += `<div class="factura-linea">${i+1}. ${p.nombre} - ${p.cantidad} unidad(es) - $${(p.precio*p.cantidad).toLocaleString()}</div>`;
            });

            contenido += `<div class="factura-total">TOTAL: $${total.toLocaleString()}</div>`;
            contenido += `<p style="text-align:center; margin-top:10px;">¡Gracias por tu preferencia!</p>`;

            detalle.innerHTML = contenido;
            document.getElementById('modal-factura').style.display = 'flex';
        }

        // DESCARGAR PDF FUNCIONAL
        function descargarPDF() {
            const nombre = document.getElementById('nombre').value;
            const nit = document.getElementById('nit').value;
            const celular = document.getElementById('celular').value;

            if (!nombre || !nit || !celular || carrito.length === 0) {
                alert('Completa los datos primero');
                return;
            }

            // Primero creamos la factura en el modal
            verFactura();
            setTimeout(() => {
                // Convertimos el contenido del modal a PDF
                const elemento = document.getElementById('contenido-modal');
                html2canvas(elemento).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF({
                        orientation: 'portrait',
                        unit: 'mm',
                        format: 'a4'
                    });
                    const imgWidth = 210;
                    const imgHeight = canvas.height * imgWidth / canvas.width;
                    pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                    const fecha = new Date().toLocaleDateString('es-CO').replace(/\//g, '-');
                    pdf.save(`Factura-VivaTeamShop-${fecha}.pdf`);
                    
                    // Cerramos el modal después de descargar
                    document.getElementById('modal-factura').style.display = 'none';
                    alert('✅ PDF descargado exitosamente! Revisa tu carpeta de Descargas.');
                });
            }, 500); // Pequeña espera para que el modal se cargue completamente
        }

        // Cerrar modal al tocar fuera
        window.onclick = function(e) {
            if (e.target.classList.contains('modal')) {
                document.getElementById('modal-factura').style.display = 'none';
            }
        }

        // INICIALIZAR
        actualizarCarrito();
    </script>
</body>
</html>
