<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Pedido y Factura</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Open Sans', sans-serif; }
        :root {
            --oro: #D4AF37;
            --verde: #25d366;
            --oscuro: #1A1A1A;
            --claro: #F8F8F8;
            --gris: #E0E0E0;
        }
        body { background: var(--claro); }
        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url(https://picsum.photos/1200/300?gold);
            background-size: cover;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        header h1 { font-size: 28px; border: 2px solid var(--oro); padding: 10px 20px; border-radius: 8px; }
        .contenedor { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: flex; flex-wrap: wrap; gap: 20px; }
        .productos { flex: 1 1 300px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .producto {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .producto img { width: 100%; height: 150px; object-fit: contain; }
        .producto button {
            background: var(--oro);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
        .carrito {
            flex: 1 1 300px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px;
            position: sticky;
            top: 20px;
        }
        .carrito h2 {
            background: var(--oro);
            color: white;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
        }
        .carrito-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--gris);
        }
        .selector-cantidad { display: flex; gap: 10px; margin: 0 10px; }
        .selector-cantidad i {
            background: var(--oro);
            color: white;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
            border-radius: 50%;
            cursor: pointer;
        }
        .carrito-item-cantidad { width: 30px; text-align: center; border: 1px solid var(--gris); border-radius: 4px; }
        .carrito-item-precio { margin-left: auto; font-weight: bold; color: var(--oro); }
        .btn-eliminar {
            color: red;
            border: 1px solid red;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
            border-radius: 50%;
            cursor: pointer;
            margin-left: 10px;
        }
        .form-datos input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid var(--gris);
            border-radius: 6px;
        }
        .total {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-top: 2px solid var(--oro);
            margin-top: 15px;
        }
        .btn-enviar {
            background: linear-gradient(90deg, var(--oro), var(--verde));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        .factura-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .factura-contenido {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
        }
        .cerrar-modal {
            background: red;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Viva Team Shop - Joyería</h1>
    </header>

    <div class="contenedor">
        <!-- PRODUCTOS -->
        <div class="productos">
            <div class="producto">
                <h3>Pulso Oro 18k Lm</h3>
                <img src="https://picsum.photos/200/200?pulso" alt="Pulso">
                <p>Precio: $130.000</p>
                <button onclick="agregarAlCarrito(1, 'Pulso Oro 18k Lm', 130000, 'https://picsum.photos/200/200?pulso')">Agregar al Carrito</button>
            </div>
            <div class="producto">
                <h3>Oso Inglés 18k</h3>
                <img src="https://picsum.photos/200/200?oso" alt="Oso">
                <p>Precio: $210.000</p>
                <button onclick="agregarAlCarrito(2, 'Oso Inglés 18k', 210000, 'https://picsum.photos/200/200?oso')">Agregar al Carrito</button>
            </div>
            <div class="producto">
                <h3>Cadena Digen 18k</h3>
                <img src="https://picsum.photos/200/200?cadena" alt="Cadena">
                <p>Precio: $180.000</p>
                <button onclick="agregarAlCarrito(3, 'Cadena Digen 18k', 180000, 'https://picsum.photos/200/200?cadena')">Agregar al Carrito</button>
            </div>
        </div>

        <!-- CARRITO -->
        <div class="carrito">
            <h2>Tu Carrito</h2>
            <div id="carrito-items"></div>
            <div class="form-datos">
                <input type="text" id="nombre" placeholder="Nombre completo *">
                <input type="text" id="celular" placeholder="Celular *">
                <input type="text" id="nit" placeholder="NIT/CC para factura *">
                <input type="text" id="direccion" placeholder="Dirección *">
            </div>
            <div class="total">
                <span>Total a pagar:</span>
                <span id="total">$0</span>
            </div>
            <button class="btn-enviar" onclick="generarYEnviar()">Enviar Pedido & Generar Factura</button>
        </div>
    </div>

    <!-- MODAL DE FACTURA -->
    <div class="factura-modal" id="factura-modal">
        <div class="factura-contenido">
            <h2>FACTURA OFICIAL</h2>
            <div id="factura-detalle"></div>
            <button class="cerrar-modal" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script>
        let carrito = [];
        const carritoItems = document.getElementById('carrito-items');
        const totalElemento = document.getElementById('total');
        const facturaModal = document.getElementById('factura-modal');
        const facturaDetalle = document.getElementById('factura-detalle');

        // AGREGAR AL CARRITO
        function agregarAlCarrito(id, nombre, precio, imagen) {
            const producto = carrito.find(p => p.id === id.toString());
            if (producto) {
                producto.cantidad++;
            } else {
                carrito.push({
                    id: id.toString(),
                    nombre: nombre,
                    precio: parseInt(precio),
                    cantidad: 1,
                    imagen: imagen
                });
            }
            actualizarCarrito();
        }

        // ACTUALIZAR CARRITO
        function actualizarCarrito() {
            carritoItems.innerHTML = '';
            let total = 0;

            if (carrito.length === 0) {
                carritoItems.innerHTML = '<p style="padding: 20px; text-align: center; color: #666;">Carrito vacío</p>';
                totalElemento.textContent = '$0';
                return;
            }

            carrito.forEach(p => {
                const subtotal = p.precio * p.cantidad;
                total += subtotal;

                const item = document.createElement('div');
                item.className = 'carrito-item';
                item.innerHTML = `
                    <img src="${p.imagen}" alt="${p.nombre}">
                    <div>
                        <h4>${p.nombre}</h4>
                        <div class="selector-cantidad">
                            <i class="fas fa-minus" onclick="cambiarCantidad(${p.id}, 'restar')"></i>
                            <input type="text" value="${p.cantidad}" readonly>
                            <i class="fas fa-plus" onclick="cambiarCantidad(${p.id}, 'sumar')"></i>
                        </div>
                        <span>$${subtotal.toLocaleString()}</span>
                        <div class="btn-eliminar" onclick="eliminarProducto(${p.id})">×</div>
                    </div>
                `;
                carritoItems.appendChild(item);
            });

            totalElemento.textContent = `$${total.toLocaleString()}`;
        }

        // CAMBIAR CANTIDAD
        function cambiarCantidad(id, accion) {
            const producto = carrito.find(p => p.id === id.toString());
            if (!producto) return;

            if (accion === 'sumar') producto.cantidad++;
            else if (producto.cantidad > 1) producto.cantidad--;

            actualizarCarrito();
        }

        // ELIMINAR PRODUCTO
        function eliminarProducto(id) {
            carrito = carrito.filter(p => p.id !== id.toString());
            actualizarCarrito();
        }

        // GENERAR Y ENVIAR
        function generarYEnviar() {
            const nombre = document.getElementById('nombre').value;
            const celular = document.getElementById('celular').value;
            const nit = document.getElementById('nit').value;
            const direccion = document.getElementById('direccion').value;

            if (!nombre || !celular || !nit || !direccion || carrito.length === 0) {
                alert('Completa todos los campos y agrega productos');
                return;
            }

            // CREAR FACTURA
            let factura = `FACTURA OFICIAL - VIVA TEAM SHOP\n\n`;
            factura += `Cliente: ${nombre}\n`;
            factura += `Celular: ${celular}\n`;
            factura += `NIT/CC: ${nit}\n`;
            factura += `Dirección: ${direccion}\n\n`;
            factura += `DETALLES:\n`;
            
            carrito.forEach(p => {
                factura += `${p.nombre} - ${p.cantidad}u - $${(p.precio * p.cantidad).toLocaleString()}\n`;
            });
            factura += `\nTOTAL: $${totalElemento.textContent}`;

            // MOSTRAR FACTURA EN MODAL
            facturaDetalle.innerHTML = factura.replace(/\n/g, '<br>');
            facturaModal.style.display = 'flex';

            // ENVIAR POR WHATSAPP
            const mensaje = encodeURIComponent(factura);
            window.open(`https://api.whatsapp.com/send?phone=+573006009000&text=${mensaje}`, '_blank');
        }

        // CERRAR MODAL
        function cerrarModal() {
            facturaModal.style.display = 'none';
        }

        // INICIALIZAR
        actualizarCarrito();
    </script>
</body>
</html>
