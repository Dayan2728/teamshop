<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Carrito Funcional</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Open Sans', sans-serif; }
        :root {
            --oro: #D4AF37;
            --verde: #25d366;
            --oscuro: #1A1A1A;
            --claro: #F8F8F8;
            --gris: #E0E0E0;
        }
        body { background: var(--claro); }
        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url(https://picsum.photos/1200/300?gold);
            background-size: cover;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        header h1 { color: white; font-size: 28px; border: 2px solid var(--oro); padding: 10px 20px; border-radius: 8px; }
        .contenedor { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: flex; flex-wrap: wrap; gap: 20px; }
        .productos { flex: 1 1 300px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .producto {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .producto img { width: 100%; height: 150px; object-fit: contain; margin: 10px 0; }
        .producto button {
            background: var(--oro);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
        .carrito {
            flex: 1 1 300px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px;
            position: sticky;
            top: 20px;
        }
        .carrito h2 { background: var(--oro); color: white; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 15px; }
        .carrito-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--gris);
        }
        .carrito-item img { width: 50px; height: 50px; object-fit: cover; margin-right: 10px; }
        .selector-cantidad { display: flex; gap: 10px; margin: 0 10px; }
        .selector-cantidad i {
            background: var(--oro);
            color: white;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
            border-radius: 50%;
            cursor: pointer;
        }
        .carrito-item-cantidad { width: 30px; text-align: center; border: 1px solid var(--gris); border-radius: 4px; }
        .carrito-item-precio { margin-left: auto; font-weight: bold; color: var(--oro); }
        .btn-eliminar {
            color: red;
            border: 1px solid red;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
            border-radius: 50%;
            cursor: pointer;
            margin-left: 10px;
        }
        .form-datos input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid var(--gris);
            border-radius: 6px;
        }
        .total {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-top: 2px solid var(--oro);
            margin-top: 15px;
        }
        .btn-enviar {
            background: linear-gradient(90deg, var(--oro), var(--verde));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }
        .vacío { text-align: center; color: var(--gris); padding: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Viva Team Shop</h1>
    </header>

    <div class="contenedor">
        <!-- PRODUCTOS -->
        <div class="productos">
            <div class="producto">
                <h3>Pulso Oro 18k Lm</h3>
                <img src="https://picsum.photos/200/200?pulso" alt="Pulso">
                <p>$130.000</p>
                <button onclick="agregar(1, 'Pulso Oro 18k Lm', 130000, 'https://picsum.photos/200/200?pulso')">Agregar al Carrito</button>
            </div>
            <div class="producto">
                <h3>Oso Ingles 18K Lm</h3>
                <img src="https://picsum.photos/200/200?oso" alt="Oso">
                <p>$210.000</p>
                <button onclick="agregar(2, 'Oso Ingles 18K Lm', 210000, 'https://picsum.photos/200/200?oso')">Agregar al Carrito</button>
            </div>
            <div class="producto">
                <h3>Cadena Digen 18K Lm</h3>
                <img src="https://picsum.photos/200/200?cadena" alt="Cadena">
                <p>$180.000</p>
                <button onclick="agregar(3, 'Cadena Digen 18K Lm', 180000, 'https://picsum.photos/200/200?cadena')">Agregar al Carrito</button>
            </div>
        </div>

        <!-- CARRITO -->
        <div class="carrito">
            <h2>Tu Carrito</h2>
            <div id="items-carrito" class="vacío">El carrito está vacío</div>
            
            <div class="form-datos">
                <input type="text" id="nombre" placeholder="Tu nombre *">
                <input type="text" id="celular" placeholder="Celular *">
                <input type="text" id="direccion" placeholder="Dirección *">
                <input type="text" id="factura" placeholder="Datos para factura *">
            </div>

            <div class="total">
                <span>Total a pagar:</span>
                <span id="total">$0</span>
            </div>

            <button class="btn-enviar" onclick="enviar()">Enviar Pedido & Factura</button>
        </div>
    </div>

    <script>
        let carrito = [];

        // FUNCIÓN PARA AGREGAR PRODUCTOS
        function agregar(id, nombre, precio, imagen) {
            const producto = carrito.find(p => p.id == id);
            if (producto) {
                producto.cantidad++;
                alert(`✅ +1 ${nombre} | Total: ${producto.cantidad}`);
            } else {
                carrito.push({ id, nombre, precio, cantidad: 1, imagen });
                alert(`✅ ${nombre} agregado!`);
            }
            mostrarCarrito();
        }

        // FUNCIÓN PARA MOSTRAR EL CARRITO
        function mostrarCarrito() {
            const contenedor = document.getElementById('items-carrito');
            const totalSpan = document.getElementById('total');
            let total = 0;

            if (carrito.length === 0) {
                contenedor.innerHTML = '<p class="vacío">El carrito está vacío</p>';
                totalSpan.textContent = '$0';
                return;
            }

            contenedor.innerHTML = '';
            carrito.forEach(p => {
                const subtotal = p.precio * p.cantidad;
                total += subtotal;

                const item = document.createElement('div');
                item.className = 'carrito-item';
                item.innerHTML = `
                    <img src="${p.imagen}" alt="${p.nombre}">
                    <div>
                        <h4>${p.nombre}</h4>
                        <div class="selector-cantidad">
                            <i onclick="cambiarCantidad(${p.id}, 'restar')">-</i>
                            <input type="text" class="carrito-item-cantidad" value="${p.cantidad}" readonly>
                            <i onclick="cambiarCantidad(${p.id}, 'sumar')">+</i>
                        </div>
                    </div>
                    <span class="carrito-item-precio">$${subtotal.toLocaleString()}</span>
                    <div class="btn-eliminar" onclick="eliminar(${p.id})">×</div>
                `;
                contenedor.appendChild(item);
            });

            totalSpan.textContent = `$${total.toLocaleString()}`;
        }

        // FUNCIÓN PARA CAMBIAR CANTIDAD
        function cambiarCantidad(id, accion) {
            const producto = carrito.find(p => p.id == id);
            if (!producto) return;

            if (accion === 'sumar') producto.cantidad++;
            else if (producto.cantidad > 1) producto.cantidad--;
            else eliminar(id);

            mostrarCarrito();
        }

        // FUNCIÓN PARA ELIMINAR
        function eliminar(id) {
            carrito = carrito.filter(p => p.id != id);
            mostrarCarrito();
        }

        // FUNCIÓN PARA ENVIAR
        function enviar() {
            const nombre = document.getElementById('nombre').value;
            const celular = document.getElementById('celular').value;
            const direccion = document.getElementById('direccion').value;
            const factura = document.getElementById('factura').value;
            const total = document.getElementById('total').textContent;

            if (!nombre || !celular || !direccion || !factura || carrito.length === 0) {
                alert('⚠️ Completa todos los campos y agrega productos');
                return;
            }

            let mensaje = `*PEDIDO VIVA TEAM SHOP*%0A%0A`;
            mensaje += `*Nombre:* ${nombre}%0A`;
            mensaje += `*Celular:* ${celular}%0A`;
            mensaje += `*Dirección:* ${direccion}%0A`;
            mensaje += `*Datos factura:* ${factura}%0A%0A`;
            mensaje += `*DETALLES:*%0A`;
            carrito.forEach(p => {
                mensaje += `${p.nombre} - ${p.cantidad} u. - $${(p.precio*p.cantidad).toLocaleString()}%0A`;
            });
            mensaje += `*TOTAL:* ${total}%0A%0A`;
            mensaje += `¡Gracias por tu compra!`;

            window.open(`https://api.whatsapp.com/send?phone=+573006009881&text=${mensaje}`, '_blank');
        }

        // INICIALIZAR
        mostrarCarrito();
    </script>
</body>
</html>
