<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva Team Shop - Joyería de Oro 18k</title>
    
    <!-- Dependencias Externas -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://kit.fontawesome.com/eb496ab1a0.js" crossorigin="anonymous"></script>
    
    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        emailjs.init('TU_CLAVE_PUBLICA_EMAILJS'); // Reemplaza con tu clave de EmailJS
    </script>

    <!-- Estilos (modularizados) -->
    <link rel="stylesheet" href="css/estilos-base.css">
    <link rel="stylesheet" href="css/estilos-productos.css">
    <link rel="stylesheet" href="css/estilos-carrito.css">
</head>
<body>
    <!-- Botón WhatsApp Fijo -->
    <a href="https://api.whatsapp.com/send?phone=+573006009881" class="btn-wsp" target="_blank">
        <i class="fa fa-whatsapp icono"></i>
    </a>

    <!-- Header -->
    <header class="header-principal">
        <h1>V I V A    T E A M    S H O P</h1>
        <p class="header-subtitulo">Joyería de Oro 18k - Calidad Garantizada</p>
    </header>

    <!-- Contenedor Principal -->
    <main class="contenedor-principal">
        <!-- Sección Productos -->
        <section class="contenedor-productos" id="contenedor-productos">
            <!-- Productos cargados dinámicamente desde JS -->
        </section>

        <!-- Sección Carrito -->
        <aside class="carrito-compras" id="carrito-compras">
            <div class="carrito-header">
                <h2>Tu Carrito</h2>
                <span class="carrito-cantidad" id="carrito-cantidad">0 productos</span>
            </div>

            <div class="carrito-items" id="carrito-items">
                <!-- Elementos del carrito cargados dinámicamente -->
            </div>

            <div class="carrito-resumen">
                <div class="resumen-fila">
                    <strong>Subtotal:</strong>
                    <span id="carrito-subtotal">$0</span>
                </div>
                <div class="resumen-fila">
                    <strong>Total:</strong>
                    <span id="carrito-total">$0</span>
                </div>
            </div>

            <!-- Formulario Datos Cliente -->
            <form class="formulario-cliente" id="formulario-cliente">
                <label for="cliente-nombre">Nombre completo:</label>
                <input type="text" id="cliente-nombre" required placeholder="Juan Pérez">

                <label for="cliente-correo">Correo electrónico:</label>
                <input type="email" id="cliente-correo" required placeholder="juan@ejemplo.com">

                <label for="cliente-telefono">Teléfono:</label>
                <input type="tel" id="cliente-telefono" required placeholder="+57 300 123 4567">

                <label for="cliente-mensaje">Mensaje adicional:</label>
                <textarea id="cliente-mensaje" placeholder="Especifica tallas, diseños o comentarios..."></textarea>

                <button type="button" class="btn-enviar-pedido" onclick="procesarPedido()">
                    <i class="fa fa-shopping-cart"></i> Enviar Pedido & Generar Factura
                </button>
            </form>
        </aside>
    </main>

    <!-- Footer -->
    <footer class="footer-principal">
        <p>&copy; 2026 Viva Team Shop - Todos los derechos reservados</p>
        <p>Contacto: <a href="https://api.whatsapp.com/send?phone=+573006009881">+57 300 600 9881</a></p>
    </footer>

    <!-- Lógica JS Modularizada -->
    <script src="js/datos-productos.js"></script>
    <script src="js/logica-carrito.js"></script>
    <script src="js/logica-pedido-factura.js"></script>
</body>
</html>
