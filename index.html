    <!-- CÓDIGO CORREGIDO PARA MANYAPIS Y ENVÍO -->
    <script>
        // Datos de Manyapis (CREA TU CUENTA GRATIS EN https://manyapis.com/)
        const MANYAPIS_API_KEY = "TU_CLAVE_API_MANYAPIS"; // REEMPLAZA CON TU CLAVE
        const TU_CORREO = "tu_correo@ejemplo.com"; // TU CORREO PARA COPIA
        const TU_WHATSAPP = "+573052804631"; // TU NÚMERO DE WHATSAPP

        // Referencias a elementos
        const btnGenerarFactura = document.getElementById('btnGenerarFactura');
        const areaFactura = document.getElementById('areaFactura');
        const contenidoFactura = document.getElementById('contenidoFactura');

        // Función para obtener datos del carrito
        function obtenerDatosCarrito() {
            const items = document.querySelectorAll('.carrito-item');
            let productos = [];
            items.forEach(item => {
                const nombre = item.querySelector('.carrito-item-titulo').textContent;
                const precio = item.querySelector('.carrito-item-precio').textContent.replace('$', '').replace('.', '');
                const cantidad = item.querySelector('.carrito-item-cantidad').value;
                const subtotal = (parseFloat(precio) * parseInt(cantidad)).toLocaleString('es-CO');
                
                productos.push({
                    name: nombre,
                    quantity: cantidad,
                    price: precio,
                    total: subtotal
                });
            });
            return {
                items: productos,
                total: document.querySelector('.carrito-precio-total').textContent.replace('$', '').replace('.', '')
            };
        }

        // Función para generar factura con Manyapis
        async function generarFacturaManyapis(datosCliente, datosCarrito) {
            try {
                const respuesta = await fetch('https://manyapis.com/api/v1/invoice-generator', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${MANYAPIS_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        from: {
                            name: "Viva Team Shop",
                            address: "Barranquilla, Atlántico - Colombia",
                            email: TU_CORREO,
                            phone: TU_WHATSAPP
                        },
                        to: {
                            name: datosCliente.nombre,
                            email: datosCliente.correo,
                            phone: datosCliente.telefono,
                            address: `${datosCliente.direccion}, ${datosCliente.ciudad}`
                        },
                        invoice_number: Math.floor(Math.random() * 10000),
                        date: new Date().toISOString().split('T')[0],
                        notes: datosCliente.mensaje || "Gracias por tu compra!",
                        currency: "COP",
                        items: datosCarrito.items,
                        total: datosCarrito.total
                    })
                });

                if (!respuesta.ok) throw new Error("Error al generar factura");
                const datos = await respuesta.json();
                return datos.pdf_url; // URL del PDF generado
            } catch (error) {
                console.error("Error Manyapis:", error);
                return null;
            }
        }

        // Función para enviar PDF por WhatsApp y correo
        async function enviarFactura(cliente, urlPDF) {
            // Enviar por WhatsApp
            const mensajeWA = `Hola ${cliente.nombre}! Aquí está tu factura de Viva Team Shop: ${urlPDF}%0A%0ADetalles del pedido:%0ADirección: ${cliente.direccion}%0ACiudad: ${cliente.ciudad}`;
            const enlaceWA = `https://api.whatsapp.com/send?phone=${cliente.telefono}&text=${mensajeWA}`;
            window.open(enlaceWA, '_blank');

            // Enviar por correo (usamos EmailJS gratis)
            try {
                // Crea cuenta en https://www.emailjs.com/ para obtener las credenciales
                emailjs.send("TU_SERVICIO_ID", "TU_PLANTILLA_ID", {
                    to_email: cliente.correo,
                    to_name: cliente.nombre,
                    from_email: TU_CORREO,
                    pdf_url: urlPDF,
                    message: cliente.mensaje || "Sin comentarios adicionales"
                }, "TU_USER_ID")
                .then(() => console.log("Correo enviado"), (err) => console.error("Error correo:", err));
            } catch (e) {
                console.log("Para enviar por correo, configura EmailJS");
            }
        }

        // Evento de clic en botón
        btnGenerarFactura.addEventListener('click', async () => {
            // Validar campos
            const nombre = document.getElementById('datoNombre').value.trim();
            const correo = document.getElementById('datoCorreo').value.trim();
            const direccion = document.getElementById('datoDireccion').value.trim();
            const ciudad = document.getElementById('datoCiudad').value.trim();
            const telefono = document.getElementById('datoTelefono').value.trim();
            const mensaje = document.getElementById('datoMensaje').value.trim();
            const datosCarrito = obtenerDatosCarrito();

            if (!nombre || !correo || !direccion || !ciudad || !telefono || datosCarrito.items.length === 0) {
                alert('⚠️ Completa todos los campos obligatorios y agrega productos al carrito!');
                return;
            }

            // Mostrar carga
            contenidoFactura.innerHTML = '<p><i class="fa fa-spinner fa-spin"></i> Generando y enviando factura...</p>';
            areaFactura.style.display = 'block';

            // Generar factura
            const datosCliente = { nombre, correo, direccion, ciudad, telefono, mensaje };
            const urlPDF = await generarFacturaManyapis(datosCliente, datosCarrito);

            if (urlPDF) {
                contenidoFactura.innerHTML = `
                    <p>Factura generada correctamente!</p>
                    <p><a href="${urlPDF}" target="_blank" class="btn-descargar">
                        <i class="fa fa-download"></i> Descargar Factura
                    </a></p>
                    <p>Se está enviando una copia a tu WhatsApp y correo.</p>
                `;
                // Enviar al cliente
                await enviarFactura(datosCliente, urlPDF);
            } else {
                contenidoFactura.innerHTML = `<p style="color: red;">Error al generar factura. Intenta de nuevo o usa la opción local.</p>
                <button id="btnFacturaLocal" class="btn-factura">Generar Factura Local</button>`;
                // Opción de respaldo local
                document.getElementById('btnFacturaLocal').addEventListener('click', () => generarFacturaLocal(datosCliente, datosCarrito));
            }
        });

        // Función de respaldo local
        function generarFacturaLocal(datosCliente, datosCarrito) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Contenido del PDF
            doc.setFontSize(16);
            doc.setTextColor(37, 211, 102);
            doc.text("FACTURA VIVA TEAM SHOP", 105, 15, null, null, 'center');
            doc.setFontSize(10);
            doc.setTextColor(0);
            doc.text("Barranquilla, Atlántico - Colombia", 105, 25, null, null, 'center');
            doc.line(10, 30, 200, 30);

            // Datos cliente
            doc.text("DATOS DEL CLIENTE", 10, 45);
            doc.text(`Nombre: ${datosCliente.nombre}`, 10, 55);
            doc.text(`Correo: ${datosCliente.correo}`, 10, 65);
            doc.text(`Dirección: ${datosCliente.direccion}`, 10, 75);
            doc.text(`Ciudad: ${datosCliente.ciudad}`, 10, 85);
            doc.text(`Teléfono: ${datosCliente.telefono}`, 10, 95);
            doc.line(10, 115, 200, 115);

            // Productos
            doc.text("DETALLE DE PRODUCTOS", 10, 130);
            doc.text("Producto", 10, 145);
            doc.text("Cant.", 70, 145);
            doc.text("Precio Unit.", 100, 145);
            doc.text("Subtotal", 150, 145);
            doc.line(10, 150, 200, 150);
            let yPos = 160;
            datosCarrito.items.forEach(item => {
                doc.text(item.name.substring(0, 20), 10, yPos);
                doc.text(item.quantity, 70, yPos);
                doc.text(`$${item.price.toLocaleString('es-CO')}`, 100, yPos);
                doc.text(`$${item.total}`, 150, yPos);
                yPos += 10;
            });
            doc.line(10, yPos, 200, yPos);
            yPos += 5;
            doc.setFontWeight('bold');
            doc.text("TOTAL A PAGAR", 100, yPos);
            doc.text(`$${datosCarrito.total.toLocaleString('es-CO')}`, 150, yPos);

            // Guardar y mostrar
            const nombrePDF = `Factura_VivaTeamShop_${datosCliente.nombre.replace(/\s+/g, '_')}.pdf`;
            doc.save(nombrePDF);
            contenidoFactura.innerHTML = `<p>✅ Factura local generada y descargada!</p>
            <p>Envíala manualmente al cliente por WhatsApp o correo.</p>`;
        }
    </script>

    <script>
        // Config
