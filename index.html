<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Facturas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .form-section, .invoice-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3498db;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 16px;
        }
        .items-container {
            margin: 20px 0;
        }
        .item-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 10px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn-add {
            background-color: #2ecc71;
            color: white;
            margin-bottom: 15px;
        }
        .btn-add:hover {
            background-color: #27ae60;
        }
        .btn-generate {
            background-color: #3498db;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
        .btn-generate:hover {
            background-color: #2980b9;
        }
        .btn-print {
            background-color: #f39c12;
            color: white;
            margin-top: 20px;
        }
        .btn-print:hover {
            background-color: #e67e22;
        }
        .invoice-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            align-items: center;
        }
        .invoice-logo h1 {
            color: #3498db;
        }
        .invoice-info p {
            margin-bottom: 5px;
            font-size: 14px;
        }
        .invoice-client, .invoice-details {
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        .invoice-table th, .invoice-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        .invoice-table th {
            background-color: #f8f9fa;
            color: #2c3e50;
        }
        .invoice-total {
            text-align: right;
            margin-right: 10px;
        }
        .invoice-total div {
            margin-bottom: 10px;
            font-size: 18px;
        }
        .invoice-total .grand-total {
            font-weight: bold;
            color: #2c3e50;
            font-size: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #3498db;
        }
        @media print {
            .form-section, .btn-print, .btn-add, .btn-generate {
                display: none;
            }
            .container {
                grid-template-columns: 1fr;
            }
            .invoice-section {
                box-shadow: none;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sección del formulario -->
        <div class="form-section">
            <h2><i class="fas fa-file-invoice"></i> Datos de la Factura</h2>
            
            <div class="form-group">
                <label for="business-name">Nombre de la Empresa</label>
                <input type="text" id="business-name" placeholder="Nombre de tu empresa">
            </div>
            <div class="form-group">
                <label for="business-address">Dirección de la Empresa</label>
                <textarea id="business-address" rows="2" placeholder="Dirección completa"></textarea>
            </div>
            <div class="form-group">
                <label for="business-phone">Teléfono de la Empresa</label>
                <input type="text" id="business-phone" placeholder="Número de teléfono">
            </div>

            <hr>

            <div class="form-group">
                <label for="client-name">Nombre del Cliente</label>
                <input type="text" id="client-name" placeholder="Nombre completo del cliente">
            </div>
            <div class="form-group">
                <label for="client-address">Dirección del Cliente</label>
                <textarea id="client-address" rows="2" placeholder="Dirección completa del cliente"></textarea>
            </div>
            <div class="form-group">
                <label for="client-email">Email del Cliente</label>
                <input type="email" id="client-email" placeholder="Email del cliente">
            </div>

            <hr>

            <div class="form-group">
                <label for="invoice-number">Número de Factura</label>
                <input type="text" id="invoice-number" placeholder="Número único de factura">
            </div>
            <div class="form-group">
                <label for="invoice-date">Fecha de Factura</label>
                <input type="date" id="invoice-date">
            </div>
            <div class="form-group">
                <label for="payment-terms">Términos de Pago</label>
                <select id="payment-terms">
                    <option value="Contado">Contado</option>
                    <option value="7 días">7 días</option>
                    <option value="15 días">15 días</option>
                    <option value="30 días">30 días</option>
                </select>
            </div>

            <hr>

            <h3><i class="fas fa-shopping-cart"></i> Artículos</h3>
            <div class="items-container" id="items-container">
                <div class="item-row">
                    <input type="text" class="item-description" placeholder="Descripción del artículo">
                    <input type="number" class="item-quantity" placeholder="Cantidad" min="1" value="1">
                    <input type="number" class="item-price" placeholder="Precio unitario" min="0" step="0.01">
                    <button type="button" class="btn-remove" onclick="removeItem(this)"><i class="fas fa-trash"></i></button>
                </div>
            </div>
            <button type="button" class="btn-add" onclick="addItem()"><i class="fas fa-plus"></i> Agregar Artículo</button>

            <button type="button" class="btn-generate" onclick="generateInvoice()"><i class="fas fa-magic"></i> Generar Factura</button>
        </div>

        <!-- Sección de la factura -->
        <div class="invoice-section">
            <h2><i class="fas fa-file-pdf"></i> Factura Generada</h2>
            <div id="invoice-preview">
                <p style="text-align: center; color: #7f8c8d; padding: 50px 0;">Completa los datos y haz clic en "Generar Factura"</p>
            </div>
            <button type="button" class="btn-print" onclick="window.print()"><i class="fas fa-print"></i> Imprimir Factura</button>
        </div>
    </div>

    <script>
        // Establecer fecha actual por defecto
        document.getElementById('invoice-date').valueAsDate = new Date();

        // Agregar nuevo artículo
        function addItem() {
            const container = document.getElementById('items-container');
            const newRow = document.createElement('div');
            newRow.className = 'item-row';
            newRow.innerHTML = `
                <input type="text" class="item-description" placeholder="Descripción del artículo">
                <input type="number" class="item-quantity" placeholder="Cantidad" min="1" value="1">
                <input type="number" class="item-price" placeholder="Precio unitario" min="0" step="0.01">
                <button type="button" class="btn-remove" onclick="removeItem(this)"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(newRow);
        }

        // Eliminar artículo
        function removeItem(button) {
            const container = document.getElementById('items-container');
            if (container.children.length > 1) {
                button.parentElement.remove();
            } else {
                alert('Debe haber al menos un artículo en la factura');
            }
        }

        // Generar factura
        function generateInvoice() {
            // Obtener datos del formulario
            const businessName = document.getElementById('business-name').value;
            const businessAddress = document.getElementById('business-address').value;
            const businessPhone = document.getElementById('business-phone').value;
            const clientName = document.getElementById('client-name').value;
            const clientAddress = document.getElementById('client-address').value;
            const clientEmail = document.getElementById('client-email').value;
            const invoiceNumber = document.getElementById('invoice-number').value;
            const invoiceDate = document.getElementById('invoice-date').value;
            const paymentTerms = document.getElementById('payment-terms').value;

            // Obtener artículos
            const itemRows = document.querySelectorAll('.item-row');
            let itemsHTML = '';
            let subtotal = 0;

            for (let i = 0; i < itemRows.length; i++) {
                const description = itemRows[i].querySelector('.item-description').value;
                const quantity = parseInt(itemRows[i].querySelector('.item-quantity').value);
                const price = parseFloat(itemRows[i].querySelector('.item-price').value);
                const total = quantity * price;
                subtotal += total;

                if (!description || isNaN(quantity) || isNaN(price)) {
                    alert('Por favor completa todos los datos de los artículos');
                    return;
                }

                itemsHTML += `
                    <tr>
                        <td>${description}</td>
                        <td>${quantity}</td>
                        <td>$${price.toFixed(2)}</td>
                        <td>$${total.toFixed(2)}</td>
                    </tr>
                `;
            }

            // Calcular impuestos y total (19% IVA por defecto)
            const taxRate = 0.19;
            const tax = subtotal * taxRate;
            const grandTotal = subtotal + tax;

            // Construir HTML de la factura
            const invoiceHTML = `
                <div class="invoice-header">
                    <div class="invoice-logo">
                        <h1>${businessName || 'Empresa Sin Nombre'}</h1>
                    </div>
                    <div class="invoice-info">
                        <p><strong>Factura #:</strong> ${invoiceNumber || '00000'}</p>
                        <p><strong>Fecha:</strong> ${invoiceDate || new Date().toLocaleDateString()}</p>
                        <p><strong>Términos:</strong> ${paymentTerms}</p>
                    </div>
                </div>

                <div class="invoice-client">
                    <div>
                        <h3>De:</h3>
                        <p>${businessName || 'Empresa Sin Nombre'}</p>
                        <p>${businessAddress || 'Dirección no proporcionada'}</p>
                        <p>${businessPhone || 'Teléfono no proporcionado'}</p>
                    </div>
                    <div>
                        <h3>Para:</h3>
                        <p>${clientName || 'Cliente Sin Nombre'}</p>
                        <p>${clientAddress || 'Dirección no proporcionada'}</p>
                        <p>${clientEmail || 'Email no proporcionado'}</p>
                    </div>
                </div>

                <table class="invoice-table">
                    <thead>
                        <tr>
                            <th>Descripción</th>
                            <th>Cantidad</th>
                            <th>Precio Unitario</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHTML}
                    </tbody>
                </table>

                <div class="invoice-total">
                    <div><strong>Subtotal:</strong> $${subtotal.toFixed(2)}</div>
                    <div><strong>IVA (19%):</strong> $${tax.toFixed(2)}</div>
                    <div class="grand-total"><strong>Total a Pagar:</strong> $${grandTotal.toFixed(2)}</div>
                </div>

                <div style="margin-top: 40px; font-size: 14px; color: #7f8c8d; text-align: center;">
                    <p>¡Gracias por tu negocio!</p>
                </div>
            `;

            // Mostrar factura
            document.getElementById('invoice-preview').innerHTML = invoiceHTML;
        }
    </script>
</body>
</html>
